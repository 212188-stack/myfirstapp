<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>道頓堀の夜 — Dotonbori Night</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Shippori+Mincho:wght@400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --river: #0a1628;
    --neon-red: #ff2244;
    --neon-orange: #ff6600;
    --neon-amber: #ffaa00;
    --neon-pink: #ff4488;
    --neon-blue: #0099ff;
    --neon-green: #00ff99;
    --neon-purple: #aa44ff;
    --gold: #e8c56a;
    --cream: #f5ead8;
  }

  html, body {
    width: 100%; height: 100%; overflow-x: hidden;
    background: #04080f;
    font-family: 'Noto Serif JP', serif;
    cursor: default;
  }

  /* ===== PHOTO BACKGROUND ===== */
  .scene {
    position: relative;
    min-height: 100vh;
    overflow: hidden;
    background: #04080f;
  }

  .bg-photo {
    position: absolute;
    inset: 0;
    z-index: 0;
    background-image: url('https://images.unsplash.com/photo-1589452271712-64b8a66c7b71?w=1600&q=80');
    background-size: cover;
    background-position: center 30%;
    background-repeat: no-repeat;
  }
  /* Dark overlay to deepen the mood and let UI elements stand out */
  .bg-photo::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(2, 5, 16, 0.45) 0%,
      rgba(4, 8, 20, 0.30) 35%,
      rgba(5, 10, 22, 0.50) 65%,
      rgba(3, 6, 14, 0.80) 85%,
      rgba(2, 4, 10, 0.95) 100%
    );
  }

  /* Subtle color grade overlay for neon warmth */
  .bg-grade {
    position: absolute;
    inset: 0;
    z-index: 1;
    background: linear-gradient(
      180deg,
      rgba(20, 0, 40, 0.15) 0%,
      rgba(180, 40, 0, 0.08) 40%,
      rgba(0, 40, 120, 0.12) 70%,
      transparent 100%
    );
    mix-blend-mode: screen;
    pointer-events: none;
  }

  /* Stars (subtle, layered on top of photo sky) */
  .stars {
    position: absolute;
    inset: 0;
    z-index: 2;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d, 3s) var(--del, 0s) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: var(--a1, 0.1); transform: scale(1); }
    to   { opacity: var(--a2, 0.5);   transform: scale(1.3); }
  }

  /* Hide the CSS buildings — real photo provides them */
  .buildings { display: none; }

  /* ===== NEON SIGNS ===== */
  .neon-signs {
    position: absolute;
    bottom: 39%;
    left: 0; right: 0;
    z-index: 8;
    height: 160px;
    pointer-events: none;
  }

  .neon-sign {
    position: absolute;
    font-family: 'Noto Serif JP', serif;
    font-weight: 600;
    letter-spacing: 0.05em;
    animation: neon-pulse var(--np, 2s) ease-in-out infinite alternate;
    white-space: nowrap;
  }
  @keyframes neon-pulse {
    from { filter: brightness(1) blur(0px); opacity: 0.9; }
    to   { filter: brightness(1.4) blur(0.5px); opacity: 1; }
  }

  /* Individual signs */
  .sign-glico {
    left: 50%; bottom: 60px; transform: translateX(-50%);
    font-size: 11px; color: #fff;
    text-shadow: 0 0 6px #fff, 0 0 12px #ffdd00, 0 0 20px #ffaa00;
    --np: 1.5s;
  }
  .sign-kani {
    left: 15%; bottom: 40px;
    font-size: 22px; color: #ff3300;
    text-shadow: 0 0 8px #ff3300, 0 0 20px #ff3300, 0 0 40px #ff0000;
    --np: 2.2s;
  }
  .sign-izakaya {
    right: 18%; bottom: 50px;
    font-size: 16px; color: #ff88cc;
    text-shadow: 0 0 6px #ff88cc, 0 0 16px #ff44aa, 0 0 30px #ff0088;
    --np: 1.8s;
  }
  .sign-ramen {
    left: 30%; bottom: 30px;
    font-size: 14px; color: #ffcc00;
    text-shadow: 0 0 6px #ffcc00, 0 0 14px #ff8800, 0 0 28px #ff6600;
    --np: 2.5s;
  }
  .sign-beer {
    right: 32%; bottom: 80px;
    font-size: 13px; color: #44ccff;
    text-shadow: 0 0 6px #44ccff, 0 0 14px #0088ff, 0 0 28px #0044ff;
    --np: 2s;
  }
  .sign-takoyaki {
    left: 55%; bottom: 20px;
    font-size: 12px; color: #ff6644;
    text-shadow: 0 0 6px #ff6644, 0 0 14px #ff3300, 0 0 26px #cc0000;
    --np: 3s;
  }

  /* Glico man board */
  .glico-board {
    position: absolute;
    left: 50%;
    bottom: 60px;
    transform: translateX(-50%);
    z-index: 4;
    width: 80px;
    height: 100px;
  }
  .glico-runner {
    position: absolute;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    width: 20px; height: 35px;
    animation: glico-glow 2s ease-in-out infinite alternate;
  }
  .glico-runner::before {
    content: '🏃';
    font-size: 24px;
    position: absolute;
    bottom: 0; left: -5px;
    filter: drop-shadow(0 0 4px #fff) drop-shadow(0 0 10px #ffdd00);
  }
  @keyframes glico-glow {
    from { filter: brightness(1); }
    to { filter: brightness(1.5) drop-shadow(0 0 8px #ffee00); }
  }

  /* ===== RIVER (overlay on photo bottom) ===== */
  .river-area {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 32%;
    background: linear-gradient(180deg, rgba(5,12,28,0.55) 0%, rgba(3,7,18,0.80) 60%, rgba(2,4,12,0.95) 100%);
    z-index: 5;
    overflow: hidden;
  }

  /* River reflections */
  .reflection {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 100%;
    overflow: hidden;
  }
  .ref-strip {
    position: absolute;
    top: 0;
    width: 3px;
    border-radius: 2px;
    animation: ref-shimmer var(--rs, 2s) var(--rd, 0s) ease-in-out infinite alternate;
    opacity: 0.5;
    background: var(--rc, #ff2244);
  }
  @keyframes ref-shimmer {
    0%   { transform: scaleY(1) translateY(0); opacity: 0.4; }
    50%  { transform: scaleY(1.1) translateY(3px); opacity: 0.6; }
    100% { transform: scaleY(0.9) translateY(-2px); opacity: 0.3; }
  }

  /* Water wave ripple */
  .water-surface {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    overflow: hidden;
  }
  .water-line {
    position: absolute;
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 30%, rgba(100,200,255,0.12) 50%, rgba(255,255,255,0.08) 70%, transparent 100%);
    animation: wave var(--wd, 4s) var(--wdel, 0s) ease-in-out infinite;
  }
  @keyframes wave {
    0%, 100% { transform: translateX(-5%) scaleX(1.1); opacity: 0.6; }
    50%       { transform: translateX(5%)  scaleX(0.9); opacity: 1; }
  }

  /* Boat */
  .boat {
    position: absolute;
    bottom: 20%;
    left: -80px;
    z-index: 7;
    animation: boat-drift 30s linear infinite;
    display: flex; align-items: flex-end;
  }
  @keyframes boat-drift {
    from { left: -80px; }
    to   { left: 110%; }
  }
  .boat-body {
    font-size: 36px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
    animation: boat-bob 3s ease-in-out infinite;
  }
  @keyframes boat-bob {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50%       { transform: translateY(-4px) rotate(1deg); }
  }
  .boat-lantern {
    position: absolute;
    top: -15px; right: 5px;
    width: 10px; height: 14px;
    background: radial-gradient(ellipse, #ffdd88, #ff8800);
    border-radius: 50% 50% 40% 40%;
    box-shadow: 0 0 8px #ff8800, 0 0 20px #ff6600;
    animation: lantern-sway 2s ease-in-out infinite alternate;
  }
  @keyframes lantern-sway {
    from { transform: rotate(-5deg); }
    to   { transform: rotate(5deg); }
  }

  /* ===== BRIDGE ===== */
  .bridge {
    position: absolute;
    bottom: 30%;
    left: 20%; right: 20%;
    z-index: 9;
    height: 20px;
  }
  .bridge-body {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 12px;
    background: linear-gradient(180deg, #2a3545 0%, #1a2535 100%);
    border-radius: 4px 4px 0 0;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.8);
  }
  .bridge-railing {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: #3a4a60;
    border-radius: 2px;
    box-shadow: 0 0 6px rgba(100,150,255,0.2);
  }

  /* ===== FOREGROUND STREET ===== */
  .street {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 18%;
    background: linear-gradient(180deg, rgba(10,18,30,0.7) 0%, rgba(5,10,20,0.92) 100%);
    z-index: 11;
  }
  .street-surface {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(255,150,50,0.15), rgba(255,80,80,0.1), rgba(100,200,255,0.15), transparent);
  }

  /* Street lamps */
  .lamp {
    position: absolute;
    bottom: 100%;
    z-index: 9;
    display: flex; flex-direction: column; align-items: center;
  }
  .lamp-post { width: 4px; height: 80px; background: #2a3040; }
  .lamp-head {
    width: 16px; height: 10px;
    background: radial-gradient(ellipse, #ffeecc, #ffaa44);
    border-radius: 50%;
    box-shadow: 0 0 10px #ffaa44, 0 0 25px #ff8800, 0 0 50px rgba(255,136,0,0.3);
    animation: lamp-flicker 5s ease-in-out infinite;
  }
  @keyframes lamp-flicker {
    0%,100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.7; }
    94% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
  }
  .lamp-glow {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 60px; height: 60px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(255,170,68,0.15), transparent 70%);
  }

  /* ===== CHARACTER ===== */
  .character-wrap {
    position: absolute;
    bottom: 17%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 15;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .character {
    position: relative;
    width: 80px;
    animation: char-breathe 3s ease-in-out infinite;
  }
  @keyframes char-breathe {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }

  /* Head */
  .head {
    width: 34px; height: 38px;
    background: #f5d0a8;
    border-radius: 50% 50% 45% 45%;
    margin: 0 auto;
    position: relative;
    z-index: 2;
    box-shadow: 0 0 8px rgba(255,180,100,0.2);
  }
  .hair {
    position: absolute;
    top: -8px; left: -3px; right: -3px;
    height: 20px;
    background: #2a1a0a;
    border-radius: 60% 60% 30% 30%;
  }
  .face {
    position: absolute;
    bottom: 8px; left: 50%;
    transform: translateX(-50%);
    width: 20px;
  }
  .eyes {
    display: flex; gap: 8px; justify-content: center;
    margin-bottom: 4px;
  }
  .eye {
    width: 4px; height: 5px;
    background: #2a1a0a;
    border-radius: 50%;
    animation: blink 4s ease-in-out infinite;
  }
  @keyframes blink {
    0%,92%,100% { transform: scaleY(1); }
    95%          { transform: scaleY(0.1); }
  }
  .smile {
    width: 14px; height: 7px;
    border: 2px solid #d4785a;
    border-top: none;
    border-radius: 0 0 10px 10px;
    margin: 0 auto;
  }
  .cheeks {
    position: absolute;
    bottom: 6px;
    display: flex; gap: 18px;
    left: 50%; transform: translateX(-50%);
  }
  .cheek {
    width: 7px; height: 4px;
    background: rgba(255,120,100,0.35);
    border-radius: 50%;
  }

  /* Body */
  .body {
    width: 44px; height: 50px;
    background: linear-gradient(180deg, #1a3a6a, #152d55);
    border-radius: 8px 8px 4px 4px;
    margin: -2px auto 0;
    position: relative;
    z-index: 1;
  }
  /* Shirt pattern */
  .body::before {
    content: '';
    position: absolute;
    top: 6px; left: 50%; transform: translateX(-50%);
    width: 20px; height: 2px;
    background: rgba(255,255,255,0.15);
    box-shadow: 0 6px 0 rgba(255,255,255,0.1), 0 12px 0 rgba(255,255,255,0.08);
  }
  .scarf {
    position: absolute;
    top: -2px; left: 50%; transform: translateX(-50%);
    width: 20px; height: 8px;
    background: #cc2244;
    border-radius: 3px;
  }

  /* Arms */
  .arms {
    position: absolute;
    top: 5px; left: 50%; transform: translateX(-50%);
    width: 64px;
    height: 40px;
  }
  .arm-left {
    position: absolute;
    left: 0; top: 0;
    width: 12px; height: 30px;
    background: #1a3a6a;
    border-radius: 6px;
    transform-origin: top center;
    animation: arm-down 3s ease-in-out infinite;
  }
  @keyframes arm-down {
    0%,100% { transform: rotate(10deg); }
    50%      { transform: rotate(15deg); }
  }
  .arm-right {
    position: absolute;
    right: 0; top: 0;
    width: 12px; height: 28px;
    background: #1a3a6a;
    border-radius: 6px;
    transform-origin: top center;
    animation: arm-raise 3s ease-in-out infinite;
  }
  @keyframes arm-raise {
    0%,100% { transform: rotate(-55deg); }
    50%      { transform: rotate(-50deg); }
  }

  /* Beer mug */
  .beer-mug {
    position: absolute;
    right: -14px; top: -22px;
    width: 20px; height: 26px;
  }
  .mug-body {
    width: 16px; height: 22px;
    background: linear-gradient(180deg, rgba(255,220,80,0.9), rgba(200,140,20,0.8));
    border-radius: 2px 2px 4px 4px;
    position: relative;
    border: 1px solid rgba(255,200,50,0.6);
    box-shadow: 0 0 6px rgba(255,200,50,0.3), inset 0 0 4px rgba(255,255,255,0.1);
  }
  .foam {
    position: absolute;
    top: -6px; left: -2px; right: -2px;
    height: 10px;
    background: radial-gradient(ellipse, rgba(255,255,255,0.95), rgba(240,240,240,0.7));
    border-radius: 50% 50% 20% 20%;
    animation: foam-bubble 1.5s ease-in-out infinite alternate;
    box-shadow: 0 0 8px rgba(255,255,255,0.6);
  }
  @keyframes foam-bubble {
    from { transform: scale(1) translateY(0); }
    to   { transform: scale(1.05) translateY(-2px); }
  }
  .foam-drop {
    position: absolute;
    top: 2px; right: -2px;
    width: 3px; height: 8px;
    background: rgba(255,255,255,0.6);
    border-radius: 50%;
    animation: drip 2s ease-in infinite;
    animation-delay: 1s;
  }
  @keyframes drip {
    0%   { top: 2px; opacity: 0; height: 3px; }
    30%  { opacity: 0.8; }
    100% { top: 22px; opacity: 0; height: 8px; }
  }
  .mug-handle {
    position: absolute;
    right: -5px; top: 4px;
    width: 7px; height: 12px;
    border: 2px solid rgba(200,140,20,0.7);
    border-left: none;
    border-radius: 0 4px 4px 0;
  }

  /* Bubbles rising from beer */
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,220,80,0.4);
    border: 1px solid rgba(255,220,80,0.6);
    animation: rise var(--bd, 1.5s) var(--bdel, 0s) ease-in infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0) scale(1); opacity: 0.8; }
    100% { transform: translateY(-30px) scale(0.3); opacity: 0; }
  }

  /* Legs */
  .legs {
    display: flex; gap: 6px;
    justify-content: center;
    margin-top: -2px;
  }
  .leg {
    width: 12px; height: 22px;
    background: #1a1a2e;
    border-radius: 3px 3px 5px 5px;
  }
  .shoe {
    width: 16px; height: 7px;
    background: #2a2020;
    border-radius: 2px 4px 4px 2px;
    margin-top: -2px;
    margin-left: -2px;
  }

  /* Excitement stars */
  .excite-star {
    position: absolute;
    font-size: 14px;
    animation: pop-star var(--es, 1s) var(--esdel, 0s) ease-out infinite;
    pointer-events: none;
  }
  @keyframes pop-star {
    0%   { transform: scale(0) rotate(0deg); opacity: 1; }
    50%  { transform: scale(1.2) rotate(20deg); opacity: 1; }
    100% { transform: scale(0.8) rotate(-10deg) translateY(-20px); opacity: 0; }
  }

  /* Sparkles */
  .sparkle {
    position: absolute;
    width: 4px; height: 4px;
    background: var(--sc, #ffdd00);
    border-radius: 50%;
    box-shadow: 0 0 4px var(--sc, #ffdd00), 0 0 10px var(--sc, #ffdd00);
    animation: sparkle-float var(--sf, 3s) var(--sfdel, 0s) ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes sparkle-float {
    0%   { transform: translateY(0) scale(1); opacity: 0; }
    30%  { opacity: 1; }
    100% { transform: translateY(-60px) scale(0.2); opacity: 0; }
  }

  /* ===== MOOD TEXT ===== */
  .mood-text {
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 20;
    pointer-events: none;
  }
  .mood-jp {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(22px, 4vw, 36px);
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.3em;
    text-shadow: 0 0 20px rgba(255,180,80,0.4), 0 2px 8px rgba(0,0,0,0.6);
    animation: text-fade-in 2s ease-out forwards;
    opacity: 0;
  }
  .mood-en {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(11px, 2vw, 16px);
    color: rgba(255,200,100,0.7);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-top: 8px;
    animation: text-fade-in 2s 0.5s ease-out forwards;
    opacity: 0;
  }
  .mood-divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,200,100,0.5), transparent);
    margin: 12px auto;
    animation: text-fade-in 2s 1s ease-out forwards;
    opacity: 0;
  }
  .mood-sub {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(9px, 1.5vw, 12px);
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.2em;
    animation: text-fade-in 2s 1.5s ease-out forwards;
    opacity: 0;
  }
  @keyframes text-fade-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== SPEECH BUBBLE ===== */
  .speech {
    position: absolute;
    bottom: calc(17% + 140px);
    left: 50%;
    transform: translateX(20px);
    z-index: 16;
    background: rgba(255,255,255,0.92);
    border-radius: 12px 12px 12px 2px;
    padding: 8px 12px;
    font-size: 12px;
    color: #2a1a0a;
    font-family: 'Noto Serif JP', serif;
    white-space: nowrap;
    animation: speech-pop 0.5s 3s cubic-bezier(0.34,1.56,0.64,1) both;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .speech::before {
    content: '';
    position: absolute;
    bottom: -8px; left: 10px;
    border: 5px solid transparent;
    border-top-color: rgba(255,255,255,0.92);
    border-bottom: none;
  }
  @keyframes speech-pop {
    from { transform: translateX(20px) scale(0.5); opacity: 0; }
    to   { transform: translateX(20px) scale(1); opacity: 1; }
  }

  /* ===== FIREFLY PARTICLES ===== */
  .firefly {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #aaffcc;
    box-shadow: 0 0 6px #aaffcc, 0 0 12px #44ffaa;
    animation: fly var(--ft, 8s) var(--fdel, 0s) ease-in-out infinite;
    pointer-events: none;
    z-index: 18;
  }
  @keyframes fly {
    0%   { transform: translate(0,0) scale(1); opacity: 0; }
    10%  { opacity: 0.8; }
    50%  { transform: translate(var(--fx, 40px), var(--fy, -60px)) scale(1.2); opacity: 0.6; }
    90%  { opacity: 0.4; }
    100% { transform: translate(var(--fx2, -30px), var(--fy2, -100px)) scale(0.5); opacity: 0; }
  }

  /* ===== MOON — hidden, real photo provides sky ===== */
  .moon { display: none; }

  /* ===== AMBIENT NEON GLOW ON WATER ===== */
  .water-glow {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(180deg,
      rgba(255, 30, 60, 0.06) 0%,
      rgba(255, 100, 0, 0.04) 25%,
      rgba(0, 150, 255, 0.04) 50%,
      transparent 100%
    );
    pointer-events: none;
    animation: glow-shift 8s ease-in-out infinite alternate;
  }
  @keyframes glow-shift {
    from { opacity: 0.7; }
    to   { opacity: 1; }
  }

  /* ===== TOGGLE BUTTON ===== */
  .toggle-btn {
    position: fixed;
    top: 24px; right: 24px;
    z-index: 100;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    backdrop-filter: blur(12px);
    border-radius: 50px;
    padding: 10px 20px;
    cursor: pointer;
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.1em;
    display: flex; align-items: center; gap: 8px;
    transition: all 0.3s ease;
    user-select: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .toggle-btn:hover {
    background: rgba(255,255,255,0.2);
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
  }
  .toggle-btn .icon { font-size: 16px; }

  /* ===== TRANSITION OVERLAY ===== */
  .transition-flash {
    position: fixed;
    inset: 0;
    z-index: 99;
    pointer-events: none;
    opacity: 0;
    background: white;
    transition: opacity 0.25s ease;
  }
  .transition-flash.flash { opacity: 0.6; }

  /* ===== DAY MODE ===== */
  .scene.day .bg-photo {
    background-image: url('https://images.unsplash.com/photo-1590559899731-a382839e5549?w=1600&q=80');
    background-position: center 40%;
  }
  .scene.day .bg-photo::after {
    background: linear-gradient(
      180deg,
      rgba(255,240,200,0.10) 0%,
      rgba(255,220,150,0.08) 40%,
      rgba(200,230,255,0.12) 70%,
      rgba(50,80,120,0.30) 100%
    );
  }
  .scene.day .bg-grade {
    background: linear-gradient(
      180deg,
      rgba(255,230,100,0.10) 0%,
      rgba(255,200,80,0.06) 50%,
      transparent 100%
    );
  }
  /* Hide night-only elements */
  .scene.day .stars { opacity: 0; transition: opacity 1.5s; }
  .scene.day .neon-signs { opacity: 0; transition: opacity 1s; }
  .scene.day .reflection { opacity: 0; transition: opacity 1s; }
  .scene.day .firefly { opacity: 0 !important; }
  .scene.day .lamp-head { box-shadow: none; background: #ccc; }
  .scene.day .lamp-glow { opacity: 0; }
  .scene.day .river-area {
    background: linear-gradient(180deg, rgba(100,160,220,0.25) 0%, rgba(60,120,180,0.45) 60%, rgba(30,80,140,0.70) 100%);
  }
  .scene.day .street {
    background: linear-gradient(180deg, rgba(60,80,100,0.30) 0%, rgba(30,50,70,0.60) 100%);
  }
  .scene.day .water-line {
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), rgba(180,220,255,0.22), rgba(255,255,255,0.18), transparent);
  }
  /* Day speech bubble */
  .scene.day .speech { display: none; }
  .scene.day .speech-day { display: block !important; }
  .scene.night .speech-day { display: none; }

  /* Day mood text */
  .mood-jp-day, .mood-en-day, .mood-sub-day { display: none; }
  .scene.day .mood-jp { display: none; }
  .scene.day .mood-en { display: none; }
  .scene.day .mood-sub { display: none; }
  .scene.day .mood-jp-day { display: block; }
  .scene.day .mood-en-day { display: block; }
  .scene.day .mood-sub-day { display: block; }

  /* Day text colors */
  .scene.day .mood-jp-day {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(22px, 4vw, 36px);
    color: rgba(255,255,255,0.95);
    letter-spacing: 0.3em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.3), 0 0 30px rgba(255,220,100,0.2);
    animation: text-fade-in 1s ease-out forwards;
  }
  .scene.day .mood-en-day {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(11px, 2vw, 16px);
    color: rgba(255,240,180,0.9);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-top: 8px;
    animation: text-fade-in 1s 0.3s ease-out forwards;
    opacity: 0;
  }
  .scene.day .mood-sub-day {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(9px, 1.5vw, 12px);
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.2em;
    animation: text-fade-in 1s 0.6s ease-out forwards;
    opacity: 0;
  }
  .scene.day .mood-divider {
    background: linear-gradient(90deg, transparent, rgba(255,220,100,0.6), transparent);
  }

  /* Sun */
  .sun {
    position: absolute;
    top: 7%; right: 14%;
    z-index: 3;
    width: 56px; height: 56px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease;
  }
  .scene.day .sun { opacity: 1; }
  .sun-circle {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #fffde0, #ffe066 50%, #ffbb00 100%);
    box-shadow: 0 0 30px rgba(255,210,50,0.7), 0 0 80px rgba(255,180,0,0.3), 0 0 120px rgba(255,160,0,0.15);
    animation: sun-glow 4s ease-in-out infinite alternate;
  }
  @keyframes sun-glow {
    from { box-shadow: 0 0 30px rgba(255,210,50,0.6), 0 0 80px rgba(255,180,0,0.25); transform: scale(1); }
    to   { box-shadow: 0 0 50px rgba(255,220,60,0.9), 0 0 120px rgba(255,200,0,0.4); transform: scale(1.04); }
  }
  .sun-ray {
    position: absolute;
    top: 50%; left: 50%;
    width: 2px; height: 14px;
    background: rgba(255,230,80,0.6);
    border-radius: 2px;
    transform-origin: 50% calc(100% + 28px + 8px);
    animation: ray-spin 12s linear infinite;
  }
  @keyframes ray-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Day transition for toggle button */
  .scene.day .toggle-btn {
    background: rgba(0,0,0,0.15);
    border-color: rgba(0,0,0,0.2);
    color: rgba(255,255,255,0.95);
  }

  /* ===== MUSIC BUTTON ===== */
  .music-btn {
    position: fixed;
    top: 24px; right: 160px;
    z-index: 100;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    backdrop-filter: blur(12px);
    border-radius: 50px;
    padding: 10px 20px;
    cursor: pointer;
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.1em;
    display: flex; align-items: center; gap: 8px;
    transition: all 0.3s ease;
    user-select: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .music-btn:hover {
    background: rgba(255,255,255,0.2);
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
  }
  .music-btn .icon { font-size: 16px; }

  /* 음표 파동 애니메이션 */
  .music-btn.playing .icon {
    animation: note-bounce 0.6s ease-in-out infinite alternate;
  }
  @keyframes note-bounce {
    from { transform: scale(1) rotate(-5deg); }
    to   { transform: scale(1.2) rotate(5deg); }
  }

  /* Smooth transitions on main elements */
  .bg-photo, .bg-photo::after, .bg-grade, .neon-signs, .stars, .river-area, .street {
    transition: all 1.2s ease;
  }
</style>
</head>
<body>
<div class="scene night" id="scene">

  <!-- Background music -->
  <audio id="bgMusic" loop>
    <source src="bg.mp3" type="audio/mpeg">
  </audio>

  <!-- Toggle button -->
  <button class="toggle-btn" id="toggleBtn" onclick="toggleDayNight()">
    <span class="icon" id="toggleIcon">☀️</span>
    <span id="toggleLabel">낮으로</span>
  </button>

  <!-- Music toggle button -->
  <button class="music-btn" id="musicBtn" onclick="toggleMusic()">
    <span class="icon" id="musicIcon">🎵</span>
    <span id="musicLabel">음악 켜기</span>
  </button>

  <!-- Flash overlay -->
  <div class="transition-flash" id="flash"></div>

  <!-- Photo background -->
  <div class="bg-photo"></div>
  <div class="bg-grade"></div>

  <!-- Sun (day only) -->
  <div class="sun" id="sun">
    <div class="sun-circle"></div>
    <div class="sun-ray" style="transform:rotate(0deg) translateX(-50%)"></div>
    <div class="sun-ray" style="transform:rotate(45deg) translateX(-50%)"></div>
    <div class="sun-ray" style="transform:rotate(90deg) translateX(-50%)"></div>
    <div class="sun-ray" style="transform:rotate(135deg) translateX(-50%)"></div>
    <div class="sun-ray" style="transform:rotate(180deg) translateX(-50%)"></div>
    <div class="sun-ray" style="transform:rotate(225deg) translateX(-50%)"></div>
    <div class="sun-ray" style="transform:rotate(270deg) translateX(-50%)"></div>
    <div class="sun-ray" style="transform:rotate(315deg) translateX(-50%)"></div>
  </div>

  <!-- Stars (faint over photo) -->
  <div class="stars" id="stars"></div>

  <!-- Moon -->
  <div class="moon">
    <div class="moon-circle"></div>
    <div class="moon-crater" style="width:8px;height:8px;top:12px;left:28px;"></div>
    <div class="moon-crater" style="width:5px;height:5px;top:24px;left:16px;"></div>
    <div class="moon-crater" style="width:6px;height:6px;top:32px;left:30px;"></div>
  </div>

  <!-- Mood Text -->
  <div class="mood-text">
    <div class="mood-jp">道頓堀の夜</div>
    <div class="mood-en">Dotonbori Night</div>
    <div class="mood-jp-day">道頓堀の昼</div>
    <div class="mood-en-day">Dotonbori Day</div>
    <div class="mood-divider"></div>
    <div class="mood-sub">처음 맞이하는 오사카의 밤, 乾杯</div>
    <div class="mood-sub-day">눈부신 오사카의 낮, いい天気！</div>
  </div>

  <!-- Buildings silhouette -->
  <div class="buildings" id="buildings"></div>

  <!-- Neon Signs -->
  <div class="neon-signs">
    <div class="neon-sign sign-kani">蟹道楽</div>
    <div class="neon-sign sign-izakaya">居酒屋</div>
    <div class="neon-sign sign-ramen">ラーメン</div>
    <div class="neon-sign sign-beer">生ビール</div>
    <div class="neon-sign sign-takoyaki">たこ焼き</div>
    <div class="neon-sign sign-glico">🏃グリコ</div>
  </div>

  <!-- River -->
  <div class="river-area">
    <div class="water-glow"></div>
    <div class="water-surface">
      <div class="water-line" style="top:2px;--wd:3s;--wdel:0s;"></div>
      <div class="water-line" style="top:5px;--wd:4s;--wdel:1s;"></div>
    </div>
    <div class="reflection" id="reflections"></div>
  </div>

  <!-- Bridge -->
  <div class="bridge">
    <div class="bridge-railing"></div>
    <div class="bridge-body"></div>
  </div>

  <!-- Boat -->
  <div class="boat">
    <div class="boat-body">🚤</div>
    <div class="boat-lantern"></div>
  </div>

  <!-- Street -->
  <div class="street">
    <div class="street-surface"></div>
    <div class="lamp" style="left:15%;">
      <div class="lamp-glow"></div>
      <div class="lamp-head"></div>
      <div class="lamp-post"></div>
    </div>
    <div class="lamp" style="left:40%;">
      <div class="lamp-glow"></div>
      <div class="lamp-head"></div>
      <div class="lamp-post"></div>
    </div>
    <div class="lamp" style="right:20%;">
      <div class="lamp-glow"></div>
      <div class="lamp-head"></div>
      <div class="lamp-post"></div>
    </div>
  </div>

  <!-- Character -->
  <div class="character-wrap" id="charWrap">
    <!-- Speech bubble (night) -->
    <div class="speech">かんぱーい！🍺</div>
    <!-- Speech bubble (day) -->
    <div class="speech speech-day" style="display:none;">わあ、きれい！☀️</div>
    <!-- Excitement sparkles -->
    <div class="excite-star" style="left:-30px;top:-40px;--es:2s;--esdel:0.3s;">✨</div>
    <div class="excite-star" style="right:-25px;top:-50px;--es:2.2s;--esdel:0.8s;">⭐</div>
    <div class="excite-star" style="left:-20px;top:-20px;--es:1.8s;--esdel:1.2s;">💫</div>

    <div class="character">
      <!-- Head -->
      <div style="position:relative;">
        <div class="head">
          <div class="hair"></div>
          <div class="face">
            <div class="eyes">
              <div class="eye"></div>
              <div class="eye"></div>
            </div>
            <div class="smile"></div>
          </div>
          <div class="cheeks">
            <div class="cheek"></div>
            <div class="cheek"></div>
          </div>
        </div>
      </div>

      <!-- Body -->
      <div style="position:relative;">
        <div class="body">
          <div class="scarf"></div>
          <!-- Arms over body -->
          <div class="arms">
            <div class="arm-left"></div>
            <div class="arm-right">
              <!-- Beer mug -->
              <div class="beer-mug">
                <div class="mug-body">
                  <div class="foam">
                    <div class="foam-drop"></div>
                  </div>
                  <div class="mug-handle"></div>
                  <!-- Bubbles in mug -->
                  <div class="bubble" style="width:3px;height:3px;left:4px;top:14px;--bd:1.2s;--bdel:0.1s;"></div>
                  <div class="bubble" style="width:2px;height:2px;left:8px;top:16px;--bd:1.5s;--bdel:0.5s;"></div>
                  <div class="bubble" style="width:2px;height:2px;left:6px;top:18px;--bd:1.8s;--bdel:0.9s;"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Legs -->
      <div class="legs">
        <div>
          <div class="leg"></div>
          <div class="shoe"></div>
        </div>
        <div>
          <div class="leg"></div>
          <div class="shoe"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Fireflies -->
  <div id="fireflies"></div>

</div>

<script>
  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*55}%;
      width:${size}px; height:${size}px;
      --d:${2+Math.random()*4}s;
      --del:${Math.random()*5}s;
      --a1:${0.1+Math.random()*0.4};
      --a2:${0.6+Math.random()*0.4};
    `;
    starsEl.appendChild(s);
  }

  // Generate buildings
  const buildingsEl = document.getElementById('buildings');
  const bldgDefs = [
    {w:60,h:80},{w:40,h:120},{w:80,h:90},{w:50,h:140},{w:70,h:100},
    {w:45,h:130},{w:90,h:75},{w:55,h:110},{w:40,h:160},{w:75,h:85},
    {w:50,h:95},{w:60,h:70},{w:85,h:120},{w:45,h:100},{w:65,h:140},
  ];
  bldgDefs.forEach(b => {
    const el = document.createElement('div');
    el.className = 'building';
    el.style.cssText = `width:${b.w}px;height:${b.h}px;`;
    buildingsEl.appendChild(el);
  });

  // Generate reflections
  const refEl = document.getElementById('reflections');
  const colors = ['#ff2244','#ff6600','#ffaa00','#ff4488','#0099ff','#00ff99','#aa44ff','#ffffff'];
  for (let i = 0; i < 40; i++) {
    const r = document.createElement('div');
    r.className = 'ref-strip';
    const col = colors[Math.floor(Math.random()*colors.length)];
    const h = 40 + Math.random() * 60;
    r.style.cssText = `
      left:${Math.random()*100}%;
      height:${h}%;
      --rc:${col};
      --rs:${1.5+Math.random()*2.5}s;
      --rd:${Math.random()*2}s;
      width:${1+Math.random()*3}px;
    `;
    refEl.appendChild(r);
  }

  // Generate fireflies
  const ffEl = document.getElementById('fireflies');
  for (let i = 0; i < 15; i++) {
    const f = document.createElement('div');
    f.className = 'firefly';
    const hues = ['#aaffcc','#ffeeaa','#aaccff','#ffaaee'];
    const col = hues[Math.floor(Math.random()*hues.length)];
    f.style.cssText = `
      left:${Math.random()*90}%;
      top:${30+Math.random()*40}%;
      background:${col};
      box-shadow:0 0 6px ${col}, 0 0 12px ${col};
      --ft:${6+Math.random()*8}s;
      --fdel:${Math.random()*6}s;
      --fx:${(Math.random()-0.5)*80}px;
      --fy:${-30-Math.random()*70}px;
      --fx2:${(Math.random()-0.5)*60}px;
      --fy2:${-60-Math.random()*80}px;
    `;
    ffEl.appendChild(f);
  }

  // ===== MUSIC TOGGLE =====
  let isMusicPlaying = false;
  const music = document.getElementById('bgMusic');
  const musicBtn = document.getElementById('musicBtn');
  const musicIcon = document.getElementById('musicIcon');
  const musicLabel = document.getElementById('musicLabel');

  function toggleMusic() {
    if (isMusicPlaying) {
      music.pause();
      musicIcon.textContent = '🎵';
      musicLabel.textContent = '음악 켜기';
      musicBtn.classList.remove('playing');
    } else {
      music.play();
      musicIcon.textContent = '🔇';
      musicLabel.textContent = '음악 끄기';
      musicBtn.classList.add('playing');
    }
    isMusicPlaying = !isMusicPlaying;
  }

  // ===== DAY / NIGHT TOGGLE =====
  let isDay = false;

  function toggleDayNight() {
    const scene = document.getElementById('scene');
    const flash = document.getElementById('flash');
    const btn = document.getElementById('toggleBtn');
    const icon = document.getElementById('toggleIcon');
    const label = document.getElementById('toggleLabel');

    // Flash effect
    flash.classList.add('flash');
    setTimeout(() => flash.classList.remove('flash'), 300);

    isDay = !isDay;

    if (isDay) {
      scene.classList.remove('night');
      scene.classList.add('day');
      icon.textContent = '🌙';
      label.textContent = '밤으로';
    } else {
      scene.classList.remove('day');
      scene.classList.add('night');
      icon.textContent = '☀️';
      label.textContent = '낮으로';
    }
  }
</script>
</body>
</html>
